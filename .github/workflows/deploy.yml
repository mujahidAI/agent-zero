name: CI/CD Pipeline

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: mujahidai/agent-zero:latest

      - name: Deploy to Oracle VM
        uses: appleboy/ssh-action@v1
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        with:
          host: ${{ secrets.ORACLE_VM_IP }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          envs: GROQ_API_KEY,TAVILY_API_KEY
          script: |
            docker pull mujahidai/agent-zero:latest
            docker stop agent-zero || true
            docker rm agent-zero || true
            docker run -d \
              --name agent-zero \
              --restart unless-stopped \
              -p 8000:8000 \
              -e GROQ_API_KEY="$GROQ_API_KEY" \
              -e TAVILY_API_KEY="$TAVILY_API_KEY" \
              mujahidai/agent-zero:latest
